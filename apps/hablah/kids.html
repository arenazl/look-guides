<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habláh — Modo Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#002554;--gold:#c9a45a;--sky:#3aaed8;--green:#4cc38a;--coral:#ff7a66;--violet:#9b8cff;--ink:#23314a}
body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#eaf6fb,#fef6ec);color:var(--ink);min-height:100vh}
.wrap{max-width:980px;margin:0 auto;padding:24px 24px 56px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.brand{display:flex;align-items:center;gap:10px}
.mark{width:36px;height:36px;border-radius:11px;background:var(--navy);display:grid;place-items:center}
.mark span{display:block;width:4px;height:15px;border-radius:2px;background:var(--gold);box-shadow:7px 0 0 var(--gold),-7px 3px 0 #fff}
.brand-name{font-family:'Fredoka',sans-serif;font-weight:700;font-size:21px;color:var(--navy)}
.kids-tag{font-family:'Fredoka',sans-serif;font-size:13px;font-weight:600;color:#fff;background:var(--coral);padding:4px 12px;border-radius:999px;margin-left:6px}
.stars{display:flex;align-items:center;gap:7px;background:#fff;border-radius:999px;padding:7px 15px;box-shadow:0 4px 14px -6px rgba(0,0,0,.2)}
.stars b{font-family:'Fredoka',sans-serif;color:var(--gold);font-size:17px}
/* hero sparky */
.hero{background:#fff;border-radius:26px;padding:26px 30px;display:flex;align-items:center;gap:26px;box-shadow:0 16px 40px -20px rgba(0,37,84,.4);margin-bottom:26px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-30px;bottom:-50px;width:180px;height:180px;border-radius:50%;background:rgba(58,174,216,.12)}
.sparky{width:120px;height:120px;flex-shrink:0;border-radius:50%;background:radial-gradient(circle at 45% 35%,#7fd4f0,#3aaed8);display:grid;place-items:center;position:relative;z-index:1;box-shadow:0 10px 26px -10px rgba(58,174,216,.7)}
.speech{position:relative;z-index:1}
.speech-bubble{background:#eaf6fb;border-radius:18px;border-bottom-left-radius:5px;padding:16px 20px;font-family:'Fredoka',sans-serif;font-size:20px;font-weight:600;color:var(--navy);line-height:1.35;max-width:420px}
.speech-bubble em{color:var(--coral);font-style:normal}
.speech-go{margin-top:14px;display:inline-flex;align-items:center;gap:9px;background:var(--green);color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;padding:12px 24px;border-radius:999px;box-shadow:0 8px 20px -8px var(--green)}
/* topics */
.section-title{font-family:'Fredoka',sans-serif;font-size:19px;font-weight:600;color:var(--navy);margin:6px 0 16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.card{background:#fff;border-radius:20px;padding:18px 14px;text-align:center;box-shadow:0 8px 22px -14px rgba(0,0,0,.3);transition:transform .15s}
.card-ico{width:62px;height:62px;margin:0 auto 12px;border-radius:18px;display:grid;place-items:center}
.card-name{font-family:'Fredoka',sans-serif;font-weight:600;font-size:15px;color:var(--ink)}
.card-en{font-size:12px;color:#9aa3af;margin-top:2px}
.card-stars{margin-top:9px;display:flex;justify-content:center;gap:3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="mark"><span></span></div><div class="brand-name">Habláh</div><span class="kids-tag">Kids</span></div>
    <div class="stars">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#c9a45a" stroke="#c9a45a" stroke-width="1"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg>
      <b>48</b>
    </div>
  </div>

  <div class="hero">
    <div class="sparky">
      <!-- Sparky el dragón -->
      <svg width="84" height="84" viewBox="0 0 84 84" fill="none">
        <ellipse cx="42" cy="48" rx="26" ry="24" fill="#5ec9ef"/>
        <ellipse cx="42" cy="52" rx="16" ry="14" fill="#d8f3ff"/>
        <path d="M20 30c-6-6-4-14 2-14 3 6 6 8 6 8z" fill="#3aaed8"/>
        <path d="M64 30c6-6 4-14-2-14-3 6-6 8-6 8z" fill="#3aaed8"/>
        <circle cx="34" cy="42" r="5" fill="#fff"/><circle cx="35" cy="43" r="2.5" fill="#16233a"/>
        <circle cx="50" cy="42" r="5" fill="#fff"/><circle cx="51" cy="43" r="2.5" fill="#16233a"/>
        <path d="M36 55c3 3 9 3 12 0" stroke="#16233a" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="28" cy="51" r="3" fill="#ff9d8a" opacity=".7"/><circle cx="56" cy="51" r="3" fill="#ff9d8a" opacity=".7"/>
      </svg>
    </div>
    <div class="speech">
      <div class="speech-bubble">¡Hola! Soy Sparky. Hoy vamos a conocer a tu familia. ¿Te animás a decir <em>This is my mom</em>?</div>
      <div class="speech-go">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke-linecap="round"/></svg>
        ¡Vamos a jugar!
      </div>
    </div>
  </div>

  <div class="section-title">Elegí una aventura</div>
  <div class="grid">
    <div class="card">
      <div class="card-ico" style="background:rgba(255,122,102,.16)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ff7a66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      </div>
      <div class="card-name">Mi familia</div><div class="card-en">My family</div>
      <div class="card-stars"><svg width="13" height="13" viewBox="0 0 24 24" fill="#c9a45a"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#c9a45a"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></div>
    </div>
    <div class="card">
      <div class="card-ico" style="background:rgba(76,195,138,.16)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4cc38a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l2-9h12l2 9"/><path d="M9 8a3 3 0 0 1 6 0"/><circle cx="8" cy="20" r="1.5"/><circle cx="16" cy="20" r="1.5"/></svg>
      </div>
      <div class="card-name">Los animales</div><div class="card-en">Animals</div>
      <div class="card-stars"><svg width="13" height="13" viewBox="0 0 24 24" fill="#c9a45a"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></div>
    </div>
    <div class="card">
      <div class="card-ico" style="background:rgba(58,174,216,.16)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3aaed8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
      </div>
      <div class="card-name">Los colores</div><div class="card-en">Colors</div>
      <div class="card-stars"><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></div>
    </div>
    <div class="card">
      <div class="card-ico" style="background:rgba(155,140,255,.16)">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#9b8cff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>
      </div>
      <div class="card-name">Las comidas</div><div class="card-en">Food</div>
      <div class="card-stars"><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg><svg width="13" height="13" viewBox="0 0 24 24" fill="#e3ddd0"><polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/></svg></div>
    </div>
  </div>
</div>
</body>
</html>
